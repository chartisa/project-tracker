<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinod Project Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px}
.topbar{background:#fff;border-bottom:1px solid #e0e0e0;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-title{font-size:15px;font-weight:600}
.sync-status{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.sync-ok{background:#EAF3DE;color:#27500A}
.sync-warn{background:#FAEEDA;color:#633806}
.sync-err{background:#FCEBEB;color:#A32D2D}
.sync-ing{background:#E6F1FB;color:#0C447C}
.tab-bar{background:#fff;border-bottom:1px solid #e0e0e0;display:flex;overflow-x:auto;padding:0 12px}
.tab{padding:10px 14px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;white-space:nowrap}
.tab.active{color:#185FA5;border-bottom-color:#185FA5}
.tab:hover:not(.active){color:#333;background:#f9f9f9}
.panel{display:none;padding:12px 14px;max-width:1200px;margin:0 auto}
.panel.active{display:block}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:12px 14px;margin-bottom:10px}
.badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600;white-space:nowrap;display:inline-block}
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
@media(max-width:600px){.metric-grid{grid-template-columns:repeat(2,1fr)}}
.metric{background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:10px 12px}
.metric-label{font-size:10px;color:#888;margin-bottom:2px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.metric-value{font-size:22px;font-weight:700;color:#1a1a1a}
.metric-sub{font-size:10px;color:#888;margin-top:2px}
.prog-bar{height:4px;border-radius:2px;background:#f0f0f0;margin-top:5px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .3s}
.proj-header-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.task-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table.tasks{width:100%;border-collapse:collapse;min-width:820px}
table.tasks th{font-size:10px;color:#888;font-weight:600;padding:4px 6px;text-align:left;border-bottom:1px solid #eee;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
table.tasks td{padding:5px 6px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
table.tasks tr:last-child td{border-bottom:none}
table.tasks tr:hover td{background:#fafafa}
input[type=text],input[type=number]{font-size:12px;width:100%;border:1px solid #e0e0e0;border-radius:6px;padding:4px 7px;background:#fff;color:#1a1a1a;font-family:inherit}
input[type=text]:focus,input[type=number]:focus{outline:none;border-color:#185FA5;box-shadow:0 0 0 2px rgba(24,95,165,.1)}
select{font-size:11px;border:1px solid #e0e0e0;border-radius:6px;padding:4px 5px;background:#fff;color:#1a1a1a;cursor:pointer;font-family:inherit}
select:focus{outline:none;border-color:#185FA5}
textarea.detail-input{font-size:11px;width:100%;border:1px solid #e0e0e0;border-radius:6px;padding:4px 6px;background:#fff;color:#1a1a1a;resize:none;font-family:inherit;min-height:38px;line-height:1.5}
textarea.detail-input:focus{outline:none;border-color:#185FA5}
input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#185FA5}
.btn{font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid #d0d0d0;background:#fff;cursor:pointer;color:#1a1a1a;font-family:inherit;font-weight:500}
.btn:hover{background:#f5f5f5}
.btn:active{transform:scale(.98)}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn-primary:hover{background:#0C447C}
.btn-danger{color:#A32D2D;border-color:transparent;padding:4px 8px}
.btn-danger:hover{background:#FCEBEB}
.btn-mic{background:#EEEDFE;color:#3C3489;border-color:#AFA9EC;display:flex;align-items:center;gap:5px}
.btn-mic.recording{background:#FCEBEB;color:#A32D2D;border-color:#F09595}
.btn-mic.recording .mic-dot{background:#A32D2D;animation:pulse 1s infinite}
.mic-dot{width:8px;height:8px;border-radius:50%;background:#3C3489;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.add-section{padding:8px 0 2px;border-top:1px dashed #e8e8e8;margin-top:6px}
.add-row1{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.4fr);gap:8px;margin-bottom:6px}
.add-row2{display:grid;grid-template-columns:70px 60px 60px 110px 90px auto;gap:6px;align-items:center}
@media(max-width:700px){.add-row2{grid-template-columns:repeat(3,1fr);row-gap:6px}}
.voice-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:7px 10px;background:#f5f4ff;border-radius:7px;border:1px solid #dddaf5}
.transcript{font-size:11px;color:#666;font-style:italic;flex:1;min-height:16px}
.section-title{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:8px;margin-top:14px}
.section-title:first-child{margin-top:0}
textarea{font-size:12px;width:100%;border:1px solid #e0e0e0;border-radius:6px;padding:7px 9px;background:#fff;color:#1a1a1a;resize:vertical;font-family:inherit;line-height:1.6}
textarea:focus{outline:none;border-color:#185FA5}
.weekly-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px}
@media(max-width:550px){.weekly-grid{grid-template-columns:repeat(2,1fr)}}
.day-col{background:#f9f9f7;border:1px solid #ebebeb;border-radius:8px;padding:8px 10px}
.day-label{font-size:10px;font-weight:700;color:#888;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.day-item{font-size:11px;color:#333;padding:2px 0;border-bottom:1px solid #f0f0f0;display:flex;align-items:flex-start;gap:4px;line-height:1.4}
.day-item:last-child{border-bottom:none}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:3px}
.ph-grid{display:grid;grid-template-columns:minmax(0,1.5fr) 36px 90px 90px 70px 70px;gap:6px;align-items:center;padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:12px}
.ph-grid:last-child{border-bottom:none}
.ph-hdr{display:grid;grid-template-columns:minmax(0,1.5fr) 36px 90px 90px 70px 70px;gap:6px;padding:3px 0 7px;font-size:10px;color:#888;font-weight:600;text-transform:uppercase;border-bottom:1px solid #e0e0e0}
.rank-btn{font-size:12px;cursor:pointer;background:none;border:none;color:#aaa;padding:0 2px;line-height:1}
.rank-btn:hover{color:#333}
.ms-grid{display:grid;grid-template-columns:minmax(0,1fr) 72px 88px 22px;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:12px}
.ms-grid:last-child{border-bottom:none}
.ritual-block{border-left:3px solid #185FA5;padding-left:11px;margin-bottom:10px}
.ritual-block ul{font-size:12px;color:#555;margin-top:3px;padding-left:15px;line-height:1.9}
.rule-item{font-size:12px;color:#555;padding:5px 0;border-bottom:1px solid #f5f5f5;line-height:1.6}
.rule-item:last-child{border-bottom:none}
.toast{position:fixed;bottom:24px;right:20px;background:#1a1a1a;color:#fff;font-size:12px;padding:8px 16px;border-radius:8px;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
.info-banner{background:#E6F1FB;border-radius:7px;padding:7px 12px;font-size:12px;color:#0C447C;margin-bottom:10px}
.report-btn-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.detail-preview{font-size:10px;color:#888;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.detail-preview:hover{color:#185FA5}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">Vinod · Project Tracker</div>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="sync-badge" class="sync-status sync-warn">Local</span>
    <button class="btn" onclick="pushToSheets()" style="font-size:11px;padding:4px 10px">Push to Sheets</button>
    <button class="btn" onclick="pullFromSheets()" style="font-size:11px;padding:4px 10px">Pull from Sheets</button>
  </div>
</div>

<div class="tab-bar">
  <button class="tab active" onclick="showTab('daily')">Daily</button>
  <button class="tab" onclick="showTab('weekly')">Weekly</button>
  <button class="tab" onclick="showTab('health')">Health</button>
  <button class="tab" onclick="showTab('ritual')">Ritual</button>
  <button class="tab" onclick="showTab('reports')">Reports</button>
</div>

<div id="daily"   class="panel active"></div>
<div id="weekly"  class="panel"></div>
<div id="health"  class="panel"></div>
<div id="ritual"  class="panel"></div>
<div id="reports" class="panel"></div>

<div class="toast" id="toast"></div>

<script>
const SHEETS_URL='https://script.google.com/macros/s/AKfycbxlJyCPzh9hEmdQ-eA05VZ1t0TAi3MmoftiYQhujCMMpb1I57OGw77Pk5hcq3YXJ4QdMA/exec';

const PROJECTS=[
  {id:'harv',    name:'HarV',     color:'#185FA5',bg:'#E6F1FB',tc:'#0C447C',dot:'#378ADD',defHrs:12},
  {id:'cefg',    name:'CeFG',     color:'#3B6D11',bg:'#EAF3DE',tc:'#27500A',dot:'#639922',defHrs:10},
  {id:'induh',   name:'IndUH',    color:'#712B13',bg:'#FAECE7',tc:'#712B13',dot:'#D85A30',defHrs:10},
  {id:'chips',   name:'ChiPS',    color:'#534AB7',bg:'#EEEDFE',tc:'#3C3489',dot:'#7F77DD',defHrs:15},
  {id:'yugma',   name:'Yugma',    color:'#854F0B',bg:'#FAEEDA',tc:'#633806',dot:'#EF9F27',defHrs:8},
  {id:'learning',name:'Learning', color:'#0F6E56',bg:'#E1F5EE',tc:'#085041',dot:'#1D9E75',defHrs:5},
  {id:'personal',name:'Personal', color:'#72243E',bg:'#FBEAF0',tc:'#72243E',dot:'#D4537E',defHrs:4}
];

const STATUS_OPTS=['','In progress','Blocked','Done','Deferred','Waiting','Review'];
const PRI_OPTS=['P1','P2','P3'];
const TAGS={
  harv:    ['Profisee','Azure','Interview','Strategy'],
  cefg:    ['Profisee','IDMC','Snowflake','Alteryx'],
  induh:   ['MDM','Data','Meeting','Docs'],
  chips:   ['Wave1','Wave2','Wave3','ADF','Purview'],
  yugma:   ['Client','BizDev','Admin','Invoice'],
  learning:['CCA','DAMA','AI','ServiceNow'],
  personal:['RE','Fitness','Family','Finance']
};
const STATUS_COLORS={'In progress':'#185FA5','Blocked':'#A32D2D','Done':'#27500A','Deferred':'#633806','Waiting':'#854F0B','Review':'#534AB7'};

let state={
  tasks:[],
  milestones:[],
  eodNotes:[],
  config:{},
  priority:[0,1,2,3,4,5,6],
  projHrs:PROJECTS.map(p=>({proj:p.id,target_hrs:p.defHrs,actual_hrs:0})),
  nextWeek:'',
  eodText:''
};
let nextId=Date.now();
let isRecording=false;
let recognition=null;
let activeProj=null;
let currentTab='daily';

// ── expanding detail status popup ─────────────────────────────
let expandedTask=null;

function toast(msg,dur=2400){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),dur);
}

function setSyncBadge(s){
  const el=document.getElementById('sync-badge');
  el.className='sync-status';
  const m={ok:['sync-ok','Synced'],warn:['sync-warn','Local'],err:['sync-err','Error'],ing:['sync-ing','Working...']};
  const[cls,txt]=m[s]||m.warn;
  el.classList.add(cls);el.textContent=txt;
}

// ── API — GET only to avoid CORS preflight ─────────────────────
// Apps Script does not handle OPTIONS preflight. All calls use GET
// with the payload base64-encoded in a 'data' param for write ops.
async function apiGet(params){
  const url=SHEETS_URL+'?'+new URLSearchParams(params).toString();
  const r=await fetch(url);
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}
async function apiPost(body){
  // Encode payload as base64 and send as GET parameter
  const encoded=btoa(unescape(encodeURIComponent(JSON.stringify(body))));
  const url=SHEETS_URL+'?method=POST&payload='+encodeURIComponent(encoded);
  const r=await fetch(url);
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

// ── PUSH local → Sheets (explicit user action) ─────────────────
async function pushToSheets(){
  setSyncBadge('ing');
  try{
    const res=await apiPost({action:'bulkSaveTasks',tasks:state.tasks});
    if(!res.ok)throw new Error(res.error);

    // push weekly hours
    const ws=getMonday(new Date());
    const whRows=state.projHrs.map(r=>({week_start:ws,proj:r.proj,target_hrs:r.target_hrs,actual_hrs:r.actual_hrs,notes:''}));
    await apiPost({action:'saveWeeklyHours',rows:whRows});

    // push milestones one by one if any
    for(const m of state.milestones){
      await apiPost({action:'updateMilestone',milestone:m}).catch(()=>apiPost({action:'saveMilestone',milestone:m}));
    }

    // push config
    await apiPost({action:'saveConfig',key:'priority_order',value:JSON.stringify(state.priority)});
    await apiPost({action:'saveConfig',key:'next_week_plan',value:state.nextWeek});

    // push today's eod
    if(state.eodText){
      await apiPost({action:'saveEODNote',note:{date:new Date().toISOString().slice(0,10),note:state.eodText,blockers:'',next_day_focus:''}});
    }

    setSyncBadge('ok');
    toast('All data pushed to Google Sheets — '+res.count+' tasks saved');
  }catch(e){
    setSyncBadge('err');
    toast('Push failed: '+e.message,4000);
  }
}

// ── PULL Sheets → local (explicit user action) ─────────────────
async function pullFromSheets(){
  if(!confirm('Pull from Sheets? This will overwrite local data with whatever is in your Google Sheet.'))return;
  setSyncBadge('ing');
  try{
    const data=await apiGet({action:'getAll'});
    if(!data.ok)throw new Error(data.error);

    state.tasks=data.tasks||[];

    const ws=getMonday(new Date());
    const whRows=(data.weeklyHours||[]).filter(r=>r.week_start===ws);
    state.projHrs=PROJECTS.map(p=>{
      const f=whRows.find(r=>r.proj===p.id);
      return{proj:p.id,target_hrs:f?Number(f.target_hrs):p.defHrs,actual_hrs:f?Number(f.actual_hrs):0};
    });

    state.milestones=data.milestones||[];
    state.eodNotes=data.eodNotes||[];
    const td=new Date().toISOString().slice(0,10);
    const tn=state.eodNotes.find(n=>n.date===td);
    state.eodText=tn?tn.note:'';
    state.config=data.config||{};
    if(state.config.priority_order){try{state.priority=JSON.parse(state.config.priority_order);}catch(e){}}
    if(state.config.next_week_plan)state.nextWeek=state.config.next_week_plan;

    if(state.tasks.length){
      const mx=Math.max(...state.tasks.map(t=>Number(t.id)||0));
      if(mx>=nextId)nextId=mx+1;
    }

    saveLocal();
    setSyncBadge('ok');
    toast('Pulled from Sheets — '+state.tasks.length+' tasks loaded');
    renders[currentTab]();
  }catch(e){
    setSyncBadge('err');
    toast('Pull failed: '+e.message,4000);
  }
}

// ── Local storage ──────────────────────────────────────────────
function saveLocal(){
  localStorage.setItem('vt4-state',JSON.stringify({
    tasks:state.tasks,priority:state.priority,
    projHrs:state.projHrs,milestones:state.milestones,
    nextWeek:state.nextWeek,eodText:state.eodText
  }));
}
function loadLocal(){
  const raw=localStorage.getItem('vt4-state');
  if(!raw)return false;
  try{
    const s=JSON.parse(raw);
    state.tasks      =s.tasks      ||[];
    state.priority   =s.priority   ||[0,1,2,3,4,5,6];
    state.projHrs    =s.projHrs    ||PROJECTS.map(p=>({proj:p.id,target_hrs:p.defHrs,actual_hrs:0}));
    state.milestones =s.milestones ||[];
    state.nextWeek   =s.nextWeek   ||'';
    state.eodText    =s.eodText    ||'';
    if(state.tasks.length){
      const mx=Math.max(...state.tasks.map(t=>Number(t.id)||0));
      if(mx>=nextId)nextId=mx+1;
    }
    return true;
  }catch(e){return false;}
}

// ── Helpers ────────────────────────────────────────────────────
function getMonday(d){const dt=new Date(d);const day=dt.getDay();dt.setDate(dt.getDate()-(day===0?6:day-1));return dt.toISOString().slice(0,10);}
function proj(id){return PROJECTS.find(p=>p.id===id)||PROJECTS[0];}
function badge(id){const p=proj(id);return`<span class="badge" style="background:${p.bg};color:${p.tc}">${p.name}</span>`;}
function sc(s){return STATUS_COLORS[s]||'#888';}
function orderedProjects(){return state.priority.map(i=>PROJECTS[i]);}
function projHrs(id){return state.projHrs.find(r=>r.proj===id)||{target_hrs:0,actual_hrs:0};}
function isDone(t){return t.done===true||t.done==='TRUE';}

function showTab(t){
  document.querySelectorAll('.tab,.panel').forEach(el=>el.classList.remove('active'));
  document.querySelector(`[onclick="showTab('${t}')"]`).classList.add('active');
  document.getElementById(t).classList.add('active');
  currentTab=t;renders[t]();
}

// ── METRICS ────────────────────────────────────────────────────
function renderMetricsHTML(){
  const total=state.tasks.length,done=state.tasks.filter(isDone).length;
  const p1=state.tasks.filter(t=>t.pri==='P1'&&!isDone(t)).length;
  const tT=state.tasks.reduce((s,t)=>s+(Number(t.target)||0),0);
  const tA=state.tasks.reduce((s,t)=>s+(Number(t.actual)||0),0);
  const pct=tT?Math.round(tA/tT*100):0;
  const blocked=state.tasks.filter(t=>t.status==='Blocked').length;
  return`<div class="metric-grid">
    <div class="metric"><div class="metric-label">Tasks done</div><div class="metric-value">${done}/${total}</div><div class="prog-bar"><div class="prog-fill" style="width:${total?Math.round(done/total*100):0}%;background:#185FA5"></div></div></div>
    <div class="metric"><div class="metric-label">P1 open</div><div class="metric-value" style="color:${p1>3?'#A32D2D':'#1a1a1a'}">${p1}</div><div class="metric-sub">${p1>3?'Reduce now':'On track'}</div></div>
    <div class="metric"><div class="metric-label">Time (min)</div><div class="metric-value">${tA}/${tT}</div><div class="prog-bar"><div class="prog-fill" style="width:${Math.min(pct,100)}%;background:${pct>=75?'#3B6D11':'#854F0B'}"></div></div></div>
    <div class="metric"><div class="metric-label">Blocked</div><div class="metric-value" style="color:${blocked?'#A32D2D':'#1a1a1a'}">${blocked}</div><div class="metric-sub">${blocked?'Needs action':'Clear'}</div></div>
  </div>`;
}

// ── DAILY TAB ──────────────────────────────────────────────────
function renderDaily(){
  let html=renderMetricsHTML();
  html+=`<div class="info-banner">Push to Sheets saves everything up. Pull from Sheets loads latest. Voice input works on Chrome desktop and Android Chrome.</div>`;

  orderedProjects().forEach((p,rank)=>{
    const ptasks=state.tasks.filter(t=>t.proj===p.id);
    const doneCount=ptasks.filter(isDone).length;

    html+=`<div class="card">
      <div class="proj-header-bar">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:11px;color:#aaa;font-weight:600">#${rank+1}</span>
          ${badge(p.id)}
          <span style="font-size:11px;color:#aaa">${doneCount}/${ptasks.length} done</span>
        </div>
      </div>

      <div class="voice-row">
        <div style="display:flex;gap:6px;align-items:center">
          <div class="mic-dot" id="micdot-${p.id}"></div>
          <button id="mic-${p.id}" class="btn btn-mic" onclick="startVoice('${p.id}','title')">
            <span id="mictext-${p.id}">Speak task</span>
          </button>
          <div class="mic-dot" id="micdot-d-${p.id}"></div>
          <button id="mic-d-${p.id}" class="btn btn-mic" onclick="startVoice('${p.id}','detail')">
            <span id="mictext-d-${p.id}">Speak detail</span>
          </button>
        </div>
        <div id="transcript-${p.id}" class="transcript">Press a Speak button and dictate</div>
      </div>

      <div class="task-wrap">
      <table class="tasks">
        <thead><tr>
          <th style="width:20px"></th>
          <th style="min-width:130px">Task</th>
          <th style="width:160px">Detailed status / notes</th>
          <th style="width:62px">Target m</th>
          <th style="width:62px">Actual m</th>
          <th style="width:48px">Pri</th>
          <th style="width:98px">Status</th>
          <th style="width:82px">Tag</th>
          <th style="width:28px"></th>
        </tr></thead>
        <tbody>`;

    ptasks.forEach(t=>{
      const done=isDone(t);
      const detailVal=String(t.detail_status||'').replace(/"/g,'&quot;').replace(/\n/g,'&#10;');
      html+=`<tr>
        <td><input type="checkbox" ${done?'checked':''} onchange="toggleDone('${t.id}')"></td>
        <td><input type="text" value="${String(t.text||'').replace(/"/g,'&quot;')}" onblur="updTask('${t.id}','text',this.value)" style="${done?'text-decoration:line-through;opacity:.45':''}"></td>

// ── Voice input — fixed ────────────────────────────────────────
let activeMode=null;

function startVoice(projId,mode){
  // mode = 'title' or 'detail'
  const sessionKey=projId+'-'+mode;

  // Stop if already recording this exact button
  if(isRecording && activeProj===projId && activeMode===mode){
    if(recognition){try{recognition.stop();}catch(e){}}
    return;
  }
  // Stop any other active session first
  if(isRecording){
    if(recognition){try{recognition.stop();}catch(e){}}
    isRecording=false;
    setMicState(activeProj,activeMode,false);
  }

  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){
    alert('Voice input requires Chrome on desktop or Android Chrome. Safari does not support this API.');
    return;
  }

  activeProj=projId;
  activeMode=mode;
  isRecording=true;
  setMicState(projId,mode,true);

  const tr=document.getElementById('transcript-'+projId);
  if(tr)tr.textContent=mode==='detail'?'Listening for detailed status...':'Listening for task title...';

  recognition=new SR();
  recognition.lang='en-US';
  recognition.continuous=false;
  recognition.interimResults=true;
  recognition.maxAlternatives=1;

  recognition.onstart=function(){
    if(tr)tr.textContent='Listening...';
  };

  recognition.onresult=function(e){
    let interim='';let final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    if(tr)tr.textContent=final||interim||'Listening...';
    if(final){
      if(mode==='detail'){
        const ta=document.getElementById('nd-'+projId);
        if(ta) ta.value=(ta.value?ta.value+' ':'')+final.trim();
      } else {
        const inp=document.getElementById('nt-'+projId);
        if(inp)inp.value=final.trim();
      }
    }
  };

  recognition.onerror=function(e){
    isRecording=false;activeProj=null;activeMode=null;
    setMicState(projId,mode,false);
    const msg={
      'not-allowed':'Microphone access denied. Click the lock icon and allow microphone.',
      'no-speech':'No speech detected. Try again.',
      'network':'Network error. Check your connection.',
      'aborted':'Stopped.'
    };
    if(tr)tr.textContent=msg[e.error]||'Error: '+e.error;
    if(e.error!=='aborted')toast(msg[e.error]||'Voice error: '+e.error,4000);
  };

  recognition.onend=function(){
    isRecording=false;activeProj=null;activeMode=null;
    setMicState(projId,mode,false);
    const tr2=document.getElementById('transcript-'+projId);
    if(tr2&&tr2.textContent==='Listening...')tr2.textContent=mode==='detail'?'Done — check detail field':'Done — check task title field';
  };

  try{
    recognition.start();
  }catch(e){
    isRecording=false;activeProj=null;activeMode=null;
    setMicState(projId,mode,false);
    toast('Could not start voice: '+e.message,4000);
  }
}

function setMicState(projId,mode,recording){
  const suffix=mode==='detail'?'-d-':'-';
  const btn=document.getElementById('mic'+suffix+projId);
  const dot=document.getElementById('micdot'+suffix+projId);
  const txt=document.getElementById('mictext'+suffix+projId);
  const idle=mode==='detail'?'Speak detail':'Speak task';
  if(btn){btn.className='btn btn-mic'+(recording?' recording':'');}
  if(dot){dot.style.background=recording?'#A32D2D':'#3C3489';}
  if(txt){txt.textContent=recording?'Stop':idle;}
}

// ── Task CRUD ──────────────────────────────────────────────────
function updTask(id,field,val){
  const t=state.tasks.find(t=>String(t.id)===String(id));
  if(!t)return;
  t[field]=(field==='target'||field==='actual')?Number(val)||0:val;
  saveLocal();
  if(field==='actual'||field==='target'){
    const mg=document.querySelector('.metric-grid');
    if(mg){const tmp=document.createElement('div');tmp.innerHTML=renderMetricsHTML();mg.replaceWith(tmp.firstChild);}
  }
}

function toggleDone(id){
  const t=state.tasks.find(t=>String(t.id)===String(id));
  if(!t)return;
  t.done=!isDone(t);
  saveLocal();renderDaily();
}

function addTask(projId){
  const text=(document.getElementById('nt-'+projId)||{}).value.trim();
  if(!text){toast('Enter a task title first');return;}
  const detail=(document.getElementById('nd-'+projId)||{}).value.trim();
  const target=parseInt((document.getElementById('ntg-'+projId)||{}).value)||30;
  const pri=(document.getElementById('ntp-'+projId)||{}).value||'P2';
  const status=(document.getElementById('nts-'+projId)||{}).value||'';
  const tag=(document.getElementById('ntt-'+projId)||{}).value||'';
  const id=String(nextId++);
  const task={id,proj:projId,text,detail_status:detail,pri,target,actual:0,status,tag,done:false,date_added:new Date().toISOString().slice(0,10)};
  state.tasks.push(task);
  saveLocal();renderDaily();
  toast('Task added — use Push to Sheets to save');
}

function deleteTask(id){
  if(!confirm('Remove this task?'))return;
  state.tasks=state.tasks.filter(t=>String(t.id)!==String(id));
  saveLocal();renderDaily();
  toast('Removed locally — Push to Sheets to sync');
}

function clearDone(){
  const count=state.tasks.filter(isDone).length;
  if(!count){toast('No completed tasks to clear');return;}
  if(!confirm('Clear '+count+' completed task(s)? They will be removed.'))return;
  state.tasks=state.tasks.filter(t=>!isDone(t));
  saveLocal();renderDaily();
  toast(count+' completed tasks cleared — Push to Sheets to sync');
}

function saveEOD(){
  const ta=document.getElementById('eod-ta');
  if(!ta)return;
  state.eodText=ta.value;
  saveLocal();
  toast('Day snapshot saved locally — use Push to Sheets to sync');
}

// ── WEEKLY TAB ─────────────────────────────────────────────────
function renderWeekly(){
  const today=new Date(),dow=today.getDay();
  const mon=new Date(today);mon.setDate(today.getDate()-(dow===0?6:dow-1));
  const wLabel=mon.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

  let html=`<div style="font-size:13px;font-weight:600;margin-bottom:10px">Week of ${wLabel}</div>`;
  html+=`<div class="weekly-grid">`;
  ['Mon','Tue','Wed','Thu','Fri'].forEach(d=>{
    html+=`<div class="day-col"><div class="day-label">${d}</div>`;
    orderedProjects().forEach(p=>{
      const t=state.tasks.find(t=>t.proj===p.id&&t.pri==='P1'&&!isDone(t));
      if(t)html+=`<div class="day-item"><span class="dot" style="background:${p.dot}"></span><span>${String(t.text).substring(0,28)}${t.text.length>28?'…':''}</span></div>`;
    });
    html+=`</div>`;
  });
  html+=`</div>`;

  html+=`<div class="card"><div class="section-title" style="margin-top:0">Weekly hours — target vs. actual</div>
    <div class="ph-hdr"><span>Project</span><span>Rank</span><span>Target hrs</span><span>Actual hrs</span><span>Variance</span><span>Health</span></div>`;
  orderedProjects().forEach((p,rank)=>{
    const ph=projHrs(p.id);
    const diff=ph.actual_hrs-ph.target_hrs;
    const pct=ph.target_hrs?Math.round(ph.actual_hrs/ph.target_hrs*100):0;
    const h=pct>=80?['On track','#27500A','#EAF3DE']:pct>=50?['At risk','#633806','#FAEEDA']:['Behind','#A32D2D','#FCEBEB'];
    html+=`<div class="ph-grid">
      ${badge(p.id)}

      <input type="number" value="${ph.target_hrs}" min="0" onblur="updProjHrs('${p.id}','target_hrs',+this.value)" style="width:65px">
      <input type="number" value="${ph.actual_hrs}" min="0" onblur="updProjHrs('${p.id}','actual_hrs',+this.value)" style="width:65px">
      <span style="font-size:12px;color:${diff>=0?'#27500A':'#A32D2D'}">${diff>=0?'+':''}${diff}h</span>
      <span class="badge" style="background:${h[2]};color:${h[1]}">${h[0]}</span>
    </div>`;
  });
  html+=`</div>`;

  html+=`<div class="card"><div class="section-title" style="margin-top:0">Next week plan (set Sunday night)</div>
    <textarea id="nw-ta" rows="8" placeholder="One key outcome per project:&#10;HarV: ...&#10;CeFG: ...&#10;IndUH: ...&#10;ChiPS: ...&#10;Yugma: ...&#10;Learning: ...&#10;Personal: ...">${state.nextWeek||''}</textarea>
    <div style="margin-top:8px;display:flex;gap:8px">
      <button class="btn btn-primary" onclick="saveNextWeek()">Save weekly plan</button>
      <button class="btn" onclick="pushToSheets()">Push to Sheets</button>
    </div>
  </div>`;

  document.getElementById('weekly').innerHTML=html;
}

function updProjHrs(projId,field,val){
  const ph=projHrs(projId);ph[field]=Number(val)||0;saveLocal();
}
function saveNextWeek(){
  const ta=document.getElementById('nw-ta');
  if(!ta)return;
  state.nextWeek=ta.value;saveLocal();
  toast('Weekly plan saved locally — Push to Sheets to sync');
}

// ── HEALTH TAB ─────────────────────────────────────────────────
function renderHealth(){
  let html=`<div class="card"><div class="section-title" style="margin-top:0">Project priority — use ▲▼ to reorder</div>
    <div class="ph-hdr"><span>Project</span><span>Rank</span><span>Weekly hrs</span><span>Completion</span><span>Health</span><span>P1 open</span></div>`;
  state.priority.forEach((pi,rank)=>{
    const p=PROJECTS[pi];
    const ptasks=state.tasks.filter(t=>t.proj===p.id);
    const done=ptasks.filter(isDone).length;
    const pct=ptasks.length?Math.round(done/ptasks.length*100):0;
    const p1=ptasks.filter(t=>t.pri==='P1'&&!isDone(t)).length;
    const ph=projHrs(p.id);
    const h=pct>=80?['On track','#27500A','#EAF3DE']:pct>=40?['At risk','#633806','#FAEEDA']:['Behind','#A32D2D','#FCEBEB'];
    html+=`<div class="ph-grid">
      <div style="display:flex;align-items:center;gap:4px">
        <div style="display:flex;flex-direction:column">
          <button class="rank-btn" onclick="moveProj(${rank},-1)">▲</button>
          <button class="rank-btn" onclick="moveProj(${rank},1)">▼</button>
        </div>
        ${badge(p.id)}
      </div>
      <span style="color:#aaa;font-size:11px">#${rank+1}</span>
      <span style="font-size:12px">${ph.actual_hrs}/${ph.target_hrs}h</span>
      <div><div style="font-size:10px;margin-bottom:2px;color:#888">${pct}%</div>
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${h[1]}"></div></div></div>
      <span class="badge" style="background:${h[2]};color:${h[1]}">${h[0]}</span>
      <span style="font-size:12px;color:${p1>2?'#A32D2D':'#888'}">${p1} P1${p1!==1?'s':''}</span>
    </div>`;
  });
  html+=`</div>`;

  html+=`<div class="card"><div class="section-title" style="margin-top:0">Monthly milestones</div>
    <div style="display:grid;grid-template-columns:minmax(0,1fr) 72px 88px 22px;gap:6px;padding:3px 0 7px;font-size:10px;color:#888;font-weight:600;text-transform:uppercase;border-bottom:1px solid #e0e0e0">
      <span>Milestone</span><span>Project</span><span>Month</span><span></span></div>`;
  state.milestones.forEach((m,i)=>{
    const p=proj(m.proj);
    html+=`<div class="ms-grid">
      <span style="${(m.done===true||m.done==='TRUE')?'text-decoration:line-through;opacity:.45':''}">${m.text||''}</span>
      ${badge(p.id)}
      <span style="color:#888">${m.month||''}</span>
      <input type="checkbox" ${(m.done===true||m.done==='TRUE')?'checked':''} onchange="toggleMS(${i})">
    </div>`;
  });
  html+=`</div>`;
  document.getElementById('health').innerHTML=html;
}

function moveProj(rank,dir){
  const nr=rank+dir;
  if(nr<0||nr>=state.priority.length)return;
  [state.priority[rank],state.priority[nr]]=[state.priority[nr],state.priority[rank]];
  saveLocal();renderHealth();
}
function toggleMS(i){
  const m=state.milestones[i];
  m.done=!(m.done===true||m.done==='TRUE');
  saveLocal();renderHealth();
}

// ── REPORTS TAB ────────────────────────────────────────────────
function renderReports(){
  const today=new Date().toISOString().slice(0,10);
  const doneTasks=state.tasks.filter(isDone);
  const inProgressTasks=state.tasks.filter(t=>t.status==='In progress'&&!isDone(t));
  const blockedTasks=state.tasks.filter(t=>t.status==='Blocked');

  let dailyReport=`DAILY PROGRESS REPORT — ${today}\n${'='.repeat(50)}\n\n`;
  orderedProjects().forEach(p=>{
    const pd=doneTasks.filter(t=>t.proj===p.id);
    const pip=inProgressTasks.filter(t=>t.proj===p.id);
    const pb=blockedTasks.filter(t=>t.proj===p.id);
    if(!pd.length&&!pip.length&&!pb.length)return;
    dailyReport+=`${p.name.toUpperCase()}\n${'-'.repeat(30)}\n`;
    if(pd.length){
      dailyReport+=`Completed:\n`;
      pd.forEach(t=>{dailyReport+=`  • ${t.text}`;if(t.detail_status)dailyReport+=` — ${t.detail_status}`;dailyReport+='\n';});
    }
    if(pip.length){
      dailyReport+=`In progress:\n`;
      pip.forEach(t=>{dailyReport+=`  • ${t.text}`;if(t.detail_status)dailyReport+=` — ${t.detail_status}`;dailyReport+='\n';});
    }
    if(pb.length){
      dailyReport+=`Blocked:\n`;
      pb.forEach(t=>{dailyReport+=`  • ${t.text}`;if(t.detail_status)dailyReport+=` — ${t.detail_status}`;dailyReport+='\n';});
    }
    dailyReport+='\n';
  });

  if(state.eodText)dailyReport+=`EOD NOTES\n${'-'.repeat(30)}\n${state.eodText}\n`;

  let weeklyReport=`WEEKLY PROGRESS REPORT — Week of ${getMonday(new Date())}\n${'='.repeat(50)}\n\n`;
  orderedProjects().forEach(p=>{
    const ph=projHrs(p.id);
    const ptasks=state.tasks.filter(t=>t.proj===p.id);
    const pdone=ptasks.filter(isDone);
    const pct=ptasks.length?Math.round(pdone.length/ptasks.length*100):0;
    weeklyReport+=`${p.name.toUpperCase()} — ${ph.actual_hrs}/${ph.target_hrs}h | ${pct}% tasks done\n`;
    ptasks.forEach(t=>{
      const s=isDone(t)?'[DONE]':t.status?`[${t.status.toUpperCase()}]`:'[OPEN]';
      weeklyReport+=`  ${s} ${t.text}`;
      if(t.detail_status)weeklyReport+=`\n         ${t.detail_status}`;
      weeklyReport+='\n';
    });
    weeklyReport+='\n';
  });
  if(state.nextWeek)weeklyReport+=`NEXT WEEK PLAN\n${'-'.repeat(30)}\n${state.nextWeek}\n`;

  document.getElementById('reports').innerHTML=`
  <div class="card">
    <div class="section-title" style="margin-top:0">Daily progress report</div>
    <p style="font-size:12px;color:#888;margin-bottom:8px">Auto-generated from today's completed, in-progress, and blocked tasks plus their Detailed status notes. Copy and paste into email or Teams.</p>
    <textarea id="daily-report" rows="18" style="font-family:monospace;font-size:11px">${dailyReport}</textarea>
    <div class="report-btn-bar">
      <button class="btn btn-primary" onclick="copyReport('daily-report')">Copy daily report</button>
      <button class="btn" onclick="renderReports()">Refresh</button>
    </div>
  </div>
  <div class="card">
    <div class="section-title" style="margin-top:0">Weekly progress report</div>
    <p style="font-size:12px;color:#888;margin-bottom:8px">Full week view with hours and all task statuses. Use this for Friday EOD reporting or weekly stakeholder updates.</p>
    <textarea id="weekly-report" rows="22" style="font-family:monospace;font-size:11px">${weeklyReport}</textarea>
    <div class="report-btn-bar">
      <button class="btn btn-primary" onclick="copyReport('weekly-report')">Copy weekly report</button>
    </div>
  </div>`;
}

function copyReport(id){
  const ta=document.getElementById(id);
  if(!ta)return;
  ta.select();
  try{
    document.execCommand('copy');
    toast('Report copied to clipboard');
  }catch(e){
    toast('Select the text manually and copy with Ctrl+C');
  }
}

else{setSyncBadge('warn');toast('No local data — use Pull from Sheets if you have existing data',4000);}
renderDaily();
