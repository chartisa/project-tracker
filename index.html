<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinod Project Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px}
.topbar{background:#fff;border-bottom:1px solid #e0e0e0;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-title{font-size:15px;font-weight:600;color:#1a1a1a}
.sync-status{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.sync-ok{background:#EAF3DE;color:#27500A}
.sync-warn{background:#FAEEDA;color:#633806}
.sync-err{background:#FCEBEB;color:#A32D2D}
.sync-ing{background:#E6F1FB;color:#0C447C}
.tab-bar{background:#fff;border-bottom:1px solid #e0e0e0;display:flex;overflow-x:auto;padding:0 12px}
.tab{padding:10px 14px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;white-space:nowrap}
.tab.active{color:#185FA5;border-bottom-color:#185FA5}
.tab:hover:not(.active){color:#333;background:#f9f9f9}
.panel{display:none;padding:12px 14px;max-width:1100px;margin:0 auto}
.panel.active{display:block}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:12px 14px;margin-bottom:10px}
.badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600;white-space:nowrap;display:inline-block}
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
@media(max-width:600px){.metric-grid{grid-template-columns:repeat(2,1fr)}}
.metric{background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:10px 12px}
.metric-label{font-size:10px;color:#888;margin-bottom:2px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.metric-value{font-size:22px;font-weight:700;color:#1a1a1a}
.metric-sub{font-size:10px;color:#888;margin-top:2px}
.prog-bar{height:4px;border-radius:2px;background:#f0f0f0;margin-top:5px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .3s}
.proj-header-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.task-wrap{overflow-x:auto}
table.tasks{width:100%;border-collapse:collapse;min-width:580px}
table.tasks th{font-size:10px;color:#888;font-weight:600;padding:4px 6px;text-align:left;border-bottom:1px solid #eee;text-transform:uppercase;letter-spacing:.03em}
table.tasks td{padding:5px 6px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
table.tasks tr:last-child td{border-bottom:none}
table.tasks tr:hover td{background:#fafafa}
input[type=text],input[type=number]{font-size:12px;width:100%;border:1px solid #e0e0e0;border-radius:6px;padding:4px 7px;background:#fff;color:#1a1a1a;font-family:inherit}
input[type=text]:focus,input[type=number]:focus{outline:none;border-color:#185FA5;box-shadow:0 0 0 2px rgba(24,95,165,.1)}
select{font-size:11px;border:1px solid #e0e0e0;border-radius:6px;padding:4px 5px;background:#fff;color:#1a1a1a;cursor:pointer;font-family:inherit}
select:focus{outline:none;border-color:#185FA5}
input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#185FA5}
.btn{font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid #d0d0d0;background:#fff;cursor:pointer;color:#1a1a1a;font-family:inherit;font-weight:500}
.btn:hover{background:#f5f5f5}
.btn:active{transform:scale(.98)}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn-primary:hover{background:#0C447C}
.btn-danger{color:#A32D2D;border-color:transparent;padding:4px 8px}
.btn-danger:hover{background:#FCEBEB;border-color:#F09595}
.btn-mic{background:#EEEDFE;color:#3C3489;border-color:#AFA9EC}
.btn-mic.recording{background:#FCEBEB;color:#A32D2D;border-color:#F09595;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.add-row{display:grid;grid-template-columns:18px minmax(0,1fr) 58px 50px 88px 76px 72px auto;gap:5px;align-items:center;padding:7px 0 2px;border-top:1px dashed #e8e8e8;margin-top:4px}
@media(max-width:700px){.add-row{grid-template-columns:18px 1fr;row-gap:5px}}
.voice-area{display:flex;align-items:center;gap:8px;flex:1}
.transcript{font-size:11px;color:#888;font-style:italic;min-height:16px;flex:1}
.section-title{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:8px;margin-top:14px}
.section-title:first-child{margin-top:0}
textarea{font-size:12px;width:100%;border:1px solid #e0e0e0;border-radius:6px;padding:7px 9px;background:#fff;color:#1a1a1a;resize:vertical;font-family:inherit;line-height:1.6}
textarea:focus{outline:none;border-color:#185FA5}
.weekly-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px}
@media(max-width:550px){.weekly-grid{grid-template-columns:repeat(2,1fr)}}
.day-col{background:#f9f9f7;border:1px solid #ebebeb;border-radius:8px;padding:8px 10px}
.day-label{font-size:10px;font-weight:700;color:#888;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.day-item{font-size:11px;color:#333;padding:2px 0;border-bottom:1px solid #f0f0f0;display:flex;align-items:flex-start;gap:4px;line-height:1.4}
.day-item:last-child{border-bottom:none}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:3px}
.ph-grid{display:grid;grid-template-columns:minmax(0,1.5fr) 36px 90px 90px 70px 70px;gap:6px;align-items:center;padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:12px}
.ph-grid:last-child{border-bottom:none}
.ph-hdr{display:grid;grid-template-columns:minmax(0,1.5fr) 36px 90px 90px 70px 70px;gap:6px;padding:3px 0 7px;font-size:10px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid #e0e0e0}
.rank-btn{font-size:12px;cursor:pointer;background:none;border:none;color:#aaa;padding:0 2px;line-height:1}
.rank-btn:hover{color:#333}
.ms-grid{display:grid;grid-template-columns:minmax(0,1fr) 72px 88px 22px;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:12px}
.ms-grid:last-child{border-bottom:none}
.ritual-block{border-left:3px solid #185FA5;padding-left:11px;margin-bottom:10px;border-radius:0}
.ritual-block ul{font-size:12px;color:#555;margin-top:3px;padding-left:15px;line-height:1.9}
.rule-item{font-size:12px;color:#555;padding:5px 0;border-bottom:1px solid #f5f5f5;line-height:1.6}
.rule-item:last-child{border-bottom:none}
.toast{position:fixed;bottom:24px;right:20px;background:#1a1a1a;color:#fff;font-size:12px;padding:8px 16px;border-radius:8px;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
.loading-overlay{display:flex;align-items:center;justify-content:center;padding:40px;color:#888;font-size:13px;gap:10px}
.spinner{width:18px;height:18px;border:2px solid #e0e0e0;border-top-color:#185FA5;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.info-banner{background:#E6F1FB;border-radius:7px;padding:7px 12px;font-size:12px;color:#0C447C;margin-bottom:10px}
.warn-banner{background:#FAEEDA;border-radius:7px;padding:7px 12px;font-size:12px;color:#633806;margin-bottom:10px}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">Vinod · Project Tracker</div>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="sync-badge" class="sync-status sync-ing">Syncing...</span>
    <button class="btn" onclick="syncAll()" style="font-size:11px;padding:4px 10px">Sync</button>
  </div>
</div>

<div class="tab-bar">
  <button class="tab active" onclick="showTab('daily')">Daily</button>
  <button class="tab" onclick="showTab('weekly')">Weekly</button>
  <button class="tab" onclick="showTab('health')">Health</button>
  <button class="tab" onclick="showTab('ritual')">Ritual</button>
</div>

<div id="daily"  class="panel active"></div>
<div id="weekly" class="panel"></div>
<div id="health" class="panel"></div>
<div id="ritual" class="panel"></div>

<div class="toast" id="toast"></div>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxlJyCPzh9hEmdQ-eA05VZ1t0TAi3MmoftiYQhujCMMpb1I57OGw77Pk5hcq3YXJ4QdMA/exec';

const PROJECTS = [
  {id:'harv',    name:'HarV',     color:'#185FA5', bg:'#E6F1FB', tc:'#0C447C', dot:'#378ADD', defHrs:12},
  {id:'cefg',    name:'CeFG',     color:'#3B6D11', bg:'#EAF3DE', tc:'#27500A', dot:'#639922', defHrs:10},
  {id:'induh',   name:'IndUH',    color:'#712B13', bg:'#FAECE7', tc:'#712B13', dot:'#D85A30', defHrs:10},
  {id:'chips',   name:'ChiPS',    color:'#534AB7', bg:'#EEEDFE', tc:'#3C3489', dot:'#7F77DD', defHrs:15},
  {id:'yugma',   name:'Yugma',    color:'#854F0B', bg:'#FAEEDA', tc:'#633806', dot:'#EF9F27', defHrs:8},
  {id:'learning',name:'Learning', color:'#0F6E56', bg:'#E1F5EE', tc:'#085041', dot:'#1D9E75', defHrs:5},
  {id:'personal',name:'Personal', color:'#72243E', bg:'#FBEAF0', tc:'#72243E', dot:'#D4537E', defHrs:4}
];

const STATUS_OPTS = ['','In progress','Blocked','Done','Deferred','Waiting','Review'];
const PRI_OPTS    = ['P1','P2','P3'];
const TAGS = {
  harv:    ['Profisee','Azure','Interview','Strategy'],
  cefg:    ['Profisee','IDMC','Snowflake','Alteryx'],
  induh:   ['MDM','Data','Meeting','Docs'],
  chips:   ['Wave1','Wave2','Wave3','ADF','Purview'],
  yugma:   ['Client','BizDev','Admin','Invoice'],
  learning:['CCA','DAMA','AI','ServiceNow'],
  personal:['RE','Fitness','Family','Finance']
};

const STATUS_COLORS = {
  'In progress':'#185FA5','Blocked':'#A32D2D','Done':'#27500A',
  'Deferred':'#633806','Waiting':'#854F0B','Review':'#534AB7'
};

// ── State ────────────────────────────────────────────────────
let state = {
  tasks:      [],
  weeklyHours:[],
  milestones: [],
  eodNotes:   [],
  config:     {},
  priority:   [0,1,2,3,4,5,6],
  projHrs:    PROJECTS.map(p=>({proj:p.id, target_hrs:p.defHrs, actual_hrs:0})),
  nextWeek:   '',
  eodText:    ''
};

let nextId       = Date.now();
let isRecording  = false;
let recognition  = null;
let activeProj   = null;
let currentTab   = 'daily';
let syncPending  = false;

// ── Toast ────────────────────────────────────────────────────
function toast(msg, dur=2200){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), dur);
}

// ── Sync status badge ────────────────────────────────────────
function setSyncBadge(state){
  const el=document.getElementById('sync-badge');
  el.className='sync-status';
  const map={ok:['sync-ok','Synced'],warn:['sync-warn','Offline'],err:['sync-err','Error'],ing:['sync-ing','Syncing...']};
  const [cls,txt]=map[state]||map.ing;
  el.classList.add(cls); el.textContent=txt;
}

// ── API calls ────────────────────────────────────────────────
async function apiGet(params){
  const url=SHEETS_URL+'?'+new URLSearchParams(params).toString();
  const r=await fetch(url);
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

async function apiPost(body){
  const r=await fetch(SHEETS_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

// ── Load all state from Sheets ───────────────────────────────
async function syncAll(){
  setSyncBadge('ing');
  try {
    const data = await apiGet({action:'getAll'});
    if(!data.ok) throw new Error(data.error);

    // Tasks
    state.tasks = data.tasks || [];

    // Weekly hours — build projHrs array
    const today     = new Date();
    const weekStart = getMonday(today);
    const whRows    = (data.weeklyHours||[]).filter(r=>r.week_start===weekStart);
    state.projHrs   = PROJECTS.map(p=>{
      const found = whRows.find(r=>r.proj===p.id);
      return {proj:p.id, target_hrs: found?Number(found.target_hrs):p.defHrs, actual_hrs: found?Number(found.actual_hrs):0};
    });

    // Milestones
    state.milestones = data.milestones || [];

    // EOD Notes
    state.eodNotes = data.eodNotes || [];
    const todayStr = today.toISOString().slice(0,10);
    const todayNote = state.eodNotes.find(n=>n.date===todayStr);
    state.eodText = todayNote ? todayNote.note : '';

    // Config
    state.config = data.config || {};
    if(state.config.priority_order){
      try{ state.priority = JSON.parse(state.config.priority_order); }catch(e){}
    }
    if(state.config.next_week_plan) state.nextWeek = state.config.next_week_plan;

    // nextId
    if(state.tasks.length){
      const maxId = Math.max(...state.tasks.map(t=>Number(t.id)||0));
      if(maxId>=nextId) nextId=maxId+1;
    }

    setSyncBadge('ok');
    toast('Synced with Google Sheets');
    renders[currentTab]();
  } catch(err){
    setSyncBadge('warn');
    toast('Offline — using local cache', 3500);
    loadLocal();
  }
}

// ── Local cache (fallback) ───────────────────────────────────
function saveLocal(){
  localStorage.setItem('vt3-state', JSON.stringify({
    tasks:state.tasks, priority:state.priority,
    projHrs:state.projHrs, milestones:state.milestones,
    nextWeek:state.nextWeek, eodText:state.eodText
  }));
}

function loadLocal(){
  const raw=localStorage.getItem('vt3-state');
  if(!raw) return;
  try{
    const s=JSON.parse(raw);
    state.tasks      = s.tasks      || [];
    state.priority   = s.priority   || [0,1,2,3,4,5,6];
    state.projHrs    = s.projHrs    || PROJECTS.map(p=>({proj:p.id,target_hrs:p.defHrs,actual_hrs:0}));
    state.milestones = s.milestones || [];
    state.nextWeek   = s.nextWeek   || '';
    state.eodText    = s.eodText    || '';
  }catch(e){}
  renders[currentTab]();
}

// ── Helpers ───────────────────────────────────────────────────
function getMonday(d){
  const dt=new Date(d);
  const day=dt.getDay();
  dt.setDate(dt.getDate()-(day===0?6:day-1));
  return dt.toISOString().slice(0,10);
}

function proj(id){ return PROJECTS.find(p=>p.id===id)||PROJECTS[0]; }

function badge(id){
  const p=proj(id);
  return `<span class="badge" style="background:${p.bg};color:${p.tc}">${p.name}</span>`;
}

function statusColor(s){ return STATUS_COLORS[s]||'#888'; }

function orderedProjects(){ return state.priority.map(i=>PROJECTS[i]); }

function projHrs(id){ return state.projHrs.find(r=>r.proj===id)||{target_hrs:0,actual_hrs:0}; }

// ── Tab switching ─────────────────────────────────────────────
function showTab(t){
  document.querySelectorAll('.tab,.panel').forEach(el=>el.classList.remove('active'));
  document.querySelector(`[onclick="showTab('${t}')"]`).classList.add('active');
  document.getElementById(t).classList.add('active');
  currentTab=t;
  renders[t]();
}

// ── DAILY TAB ─────────────────────────────────────────────────
function renderMetricsHTML(){
  const total=state.tasks.length, done=state.tasks.filter(t=>t.done===true||t.done==='TRUE').length;
  const p1=state.tasks.filter(t=>t.pri==='P1'&&t.done!==true&&t.done!=='TRUE').length;
  const tTarget=state.tasks.reduce((s,t)=>s+(Number(t.target)||0),0);
  const tActual=state.tasks.reduce((s,t)=>s+(Number(t.actual)||0),0);
  const pct=tTarget?Math.round(tActual/tTarget*100):0;
  const blocked=state.tasks.filter(t=>t.status==='Blocked').length;
  return `<div class="metric-grid">
    <div class="metric"><div class="metric-label">Tasks done</div><div class="metric-value">${done}/${total}</div><div class="prog-bar"><div class="prog-fill" style="width:${total?Math.round(done/total*100):0}%;background:#185FA5"></div></div></div>
    <div class="metric"><div class="metric-label">P1 open</div><div class="metric-value" style="color:${p1>3?'#A32D2D':'#1a1a1a'}">${p1}</div><div class="metric-sub">${p1>3?'⚠ Reduce now':'On track'}</div></div>
    <div class="metric"><div class="metric-label">Time (min)</div><div class="metric-value">${tActual}/${tTarget}</div><div class="prog-bar"><div class="prog-fill" style="width:${Math.min(pct,100)}%;background:${pct>=75?'#3B6D11':'#854F0B'}"></div></div></div>
    <div class="metric"><div class="metric-label">Blocked</div><div class="metric-value" style="color:${blocked?'#A32D2D':'#1a1a1a'}">${blocked}</div><div class="metric-sub">${blocked?'Needs action':'Clear'}</div></div>
  </div>`;
}

function renderDaily(){
  let html = renderMetricsHTML();
  html += `<div class="info-banner">Speak button uses voice input (Chrome/Android). Set actual minutes after each task. Max 3 P1s total across all projects.</div>`;

  orderedProjects().forEach((p,rank)=>{
    const ptasks = state.tasks.filter(t=>t.proj===p.id);
    const doneCount = ptasks.filter(t=>t.done===true||t.done==='TRUE').length;
    html += `<div class="card">
      <div class="proj-header-bar">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:11px;color:#aaa;font-weight:600">#${rank+1}</span>
          ${badge(p.id)}
          <span style="font-size:11px;color:#aaa">${doneCount}/${ptasks.length} done</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div id="transcript-${p.id}" class="transcript" style="max-width:150px"></div>
          <button id="mic-${p.id}" class="btn btn-mic" onclick="startVoice('${p.id}')" style="font-size:12px;padding:4px 10px">&#9679; Speak</button>
        </div>
      </div>
      <div class="task-wrap">
      <table class="tasks">
        <thead><tr>
          <th style="width:20px"></th>
          <th>Task</th>
          <th style="width:65px">Target m</th>
          <th style="width:65px">Actual m</th>
          <th style="width:50px">Pri</th>
          <th style="width:100px">Status</th>
          <th style="width:85px">Tag</th>
          <th style="width:30px"></th>
        </tr></thead>
        <tbody>`;
    ptasks.forEach(t=>{
      const isDone = t.done===true||t.done==='TRUE';
      const sc = statusColor(t.status);
      html += `<tr>
        <td><input type="checkbox" ${isDone?'checked':''} onchange="toggleDone('${t.id}')"></td>
        <td><input type="text" value="${String(t.text||'').replace(/"/g,'&quot;')}" onblur="updTask('${t.id}','text',this.value)" style="${isDone?'text-decoration:line-through;opacity:.45':''}"></td>
        <td><input type="number" value="${t.target||0}" min="0" onblur="updTask('${t.id}','target',+this.value)"></td>
        <td><input type="number" value="${t.actual||0}" min="0" onblur="updTask('${t.id}','actual',+this.value)"></td>
        <td><select onchange="updTask('${t.id}','pri',this.value)">${PRI_OPTS.map(o=>`<option ${t.pri===o?'selected':''}>${o}</option>`).join('')}</select></td>
        <td><select onchange="updTask('${t.id}','status',this.value)" style="color:${sc}">
          ${STATUS_OPTS.map(o=>`<option ${t.status===o?'selected':''} style="color:${statusColor(o)||'#1a1a1a'}">${o}</option>`).join('')}
        </select></td>
        <td><select onchange="updTask('${t.id}','tag',this.value)">
          <option value="">—</option>
          ${(TAGS[p.id]||[]).map(o=>`<option ${t.tag===o?'selected':''}>${o}</option>`).join('')}
        </select></td>
        <td><button class="btn btn-danger" onclick="deleteTask('${t.id}')">✕</button></td>
      </tr>`;
    });
    html += `</tbody></table></div>
      <div class="add-row">
        <span></span>
        <input type="text" placeholder="New task (or Speak)..." id="nt-${p.id}">
        <input type="number" value="30" id="ntg-${p.id}" min="0">
        <select id="ntp-${p.id}">${PRI_OPTS.map((o,i)=>`<option ${i===1?'selected':''}>${o}</option>`).join('')}</select>
        <select id="nts-${p.id}">${STATUS_OPTS.map(o=>`<option>${o}</option>`).join('')}</select>
        <select id="ntt-${p.id}"><option value="">—</option>${(TAGS[p.id]||[]).map(o=>`<option>${o}</option>`).join('')}</select>
        <button class="btn btn-primary" onclick="addTask('${p.id}')">+ Add</button>
      </div>
    </div>`;
  });

  html += `<div class="card">
    <div class="section-title">End-of-day notes & blockers</div>
    <textarea id="eod-ta" rows="3" placeholder="Blockers · Deferrals · Decisions needed · Next day focus...">${state.eodText||''}</textarea>
    <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="saveEOD()">Save day snapshot</button>
      <button class="btn" onclick="clearDone()">Clear completed</button>
    </div>
  </div>`;

  document.getElementById('daily').innerHTML = html;
}

// ── Task actions ──────────────────────────────────────────────
async function toggleDone(id){
  const t = state.tasks.find(t=>String(t.id)===String(id));
  if(!t) return;
  t.done = !(t.done===true||t.done==='TRUE');
  saveLocal(); renderDaily();
  try{ await apiPost({action:'updateTask', task:{...t, done:t.done}}); setSyncBadge('ok'); }
  catch(e){ setSyncBadge('warn'); }
}

async function updTask(id, field, val){
  const t = state.tasks.find(t=>String(t.id)===String(id));
  if(!t) return;
  t[field] = field==='target'||field==='actual' ? Number(val)||0 : val;
  saveLocal();
  if(field==='actual'||field==='target') renderMetrics_inline();
  try{ await apiPost({action:'updateTask', task:{...t}}); setSyncBadge('ok'); }
  catch(e){ setSyncBadge('warn'); }
}

function renderMetrics_inline(){

async function addTask(projId){
  const text = document.getElementById(`nt-${projId}`).value.trim();
  if(!text){ toast('Enter a task first'); return; }
  const id     = String(nextId++);
  const target = parseInt(document.getElementById(`ntg-${projId}`).value)||30;
  const pri    = document.getElementById(`ntp-${projId}`).value;
  const status = document.getElementById(`nts-${projId}`).value;
  const tag    = document.getElementById(`ntt-${projId}`).value;
  const task   = {id, proj:projId, text, pri, target, actual:0, status, tag, done:false,
                  date_added:new Date().toISOString().slice(0,10)};
  state.tasks.push(task);
  saveLocal(); renderDaily();
  try{ await apiPost({action:'saveTask', task}); setSyncBadge('ok'); toast('Task saved'); }
  catch(e){ setSyncBadge('warn'); toast('Saved locally (offline)'); }
}

async function deleteTask(id){
  if(!confirm('Remove this task?')) return;
  state.tasks = state.tasks.filter(t=>String(t.id)!==String(id));
  saveLocal(); renderDaily();
  try{ await apiPost({action:'deleteTask', id}); setSyncBadge('ok'); }
  catch(e){ setSyncBadge('warn'); }
}

async function clearDone(){
  const ids = state.tasks.filter(t=>t.done===true||t.done==='TRUE').map(t=>t.id);
  state.tasks = state.tasks.filter(t=>t.done!==true&&t.done!=='TRUE');
  saveLocal(); renderDaily();
  for(const id of ids){
    try{ await apiPost({action:'deleteTask', id}); }catch(e){}
  }
  setSyncBadge('ok'); toast('Completed tasks cleared');
}

// ── Voice input ───────────────────────────────────────────────
function startVoice(projId){
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ alert('Voice input requires Chrome on desktop or Android Chrome.'); return; }
  if(isRecording && activeProj===projId){ recognition&&recognition.stop(); return; }
  if(isRecording) recognition&&recognition.stop();
  activeProj=projId; isRecording=true;
  const btn=document.getElementById(`mic-${projId}`);
  const tr=document.getElementById(`transcript-${projId}`);
  if(btn){ btn.className='btn btn-mic recording'; btn.textContent='■ Stop'; }
  if(tr) tr.textContent='Listening...';
  recognition=new SR();
  recognition.continuous=false; recognition.interimResults=true;
  recognition.onresult=e=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join('');
    if(tr) tr.textContent=t;
    if(e.results[e.results.length-1].isFinal){
      const inp=document.getElementById(`nt-${projId}`);
      if(inp) inp.value=t;
    }
  };
  recognition.onend=()=>{
    isRecording=false; activeProj=null;
    const b=document.getElementById(`mic-${projId}`);
    if(b){ b.className='btn btn-mic'; b.textContent='● Speak'; }
  };
  recognition.onerror=e=>{
    isRecording=false; activeProj=null;
    const b=document.getElementById(`mic-${projId}`);
    if(b){ b.className='btn btn-mic'; b.textContent='● Speak'; }
    if(e.error!=='aborted') toast('Voice error: '+e.error);
  };
  recognition.start();
}

function renderWeekly(){
  const today=new Date(), dow=today.getDay();
  const mon=new Date(today); mon.setDate(today.getDate()-(dow===0?6:dow-1));
  const wLabel=mon.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const weekStart=getMonday(today);

  let html=`<div style="font-size:13px;font-weight:600;margin-bottom:10px">Week of ${wLabel}</div>`;

  // 5-day P1 grid
  html+=`<div class="weekly-grid">`;
  ['Mon','Tue','Wed','Thu','Fri'].forEach(d=>{
    html+=`<div class="day-col"><div class="day-label">${d}</div>`;
    orderedProjects().forEach(p=>{
      const t=state.tasks.find(t=>t.proj===p.id&&t.pri==='P1'&&t.done!==true&&t.done!=='TRUE');
      if(t) html+=`<div class="day-item"><span class="dot" style="background:${p.dot}"></span><span>${String(t.text).substring(0,28)}${t.text.length>28?'…':''}</span></div>`;
    });

  // Target vs actual hours
  html+=`<div class="card"><div class="section-title" style="margin-top:0">Weekly hours — target vs. actual</div>
    <div class="ph-hdr"><span>Project</span><span>Rank</span><span>Target hrs</span><span>Actual hrs</span><span>Variance</span><span>Health</span></div>`;
  orderedProjects().forEach((p,rank)=>{
    const ph=projHrs(p.id);
    const diff=ph.actual_hrs-ph.target_hrs;
    const pct=ph.target_hrs?Math.round(ph.actual_hrs/ph.target_hrs*100):0;
    const h=pct>=80?['On track','#27500A','#EAF3DE']:pct>=50?['At risk','#633806','#FAEEDA']:['Behind','#A32D2D','#FCEBEB'];
    html+=`<div class="ph-grid">

      <input type="number" value="${ph.target_hrs}" min="0" onblur="updProjHrs('${p.id}','target_hrs',+this.value)" style="width:65px">
      <input type="number" value="${ph.actual_hrs}" min="0" onblur="updProjHrs('${p.id}','actual_hrs',+this.value)" style="width:65px">
      <span style="font-size:12px;color:${diff>=0?'#27500A':'#A32D2D'}">${diff>=0?'+':''}${diff}h</span>
      <span class="badge" style="background:${h[2]};color:${h[1]}">${h[0]}</span>
    </div>`;
  });
  html+=`</div>`;

  html+=`<div class="card"><div class="section-title" style="margin-top:0">Next week plan (set Sunday night)</div>
    <textarea id="nw-ta" rows="8" placeholder="One key outcome per project:&#10;HarV: ...&#10;CeFG: ...&#10;IndUH: ...&#10;ChiPS: ...&#10;Yugma: ...&#10;Learning: ...&#10;Personal: ...">${state.nextWeek||''}</textarea>
    <div style="margin-top:8px"><button class="btn btn-primary" onclick="saveNextWeek()">Save weekly plan</button></div>
  </div>`;

  document.getElementById('weekly').innerHTML=html;
}

    const p1=ptasks.filter(t=>t.pri==='P1'&&t.done!==true&&t.done!=='TRUE').length;
    const ph=projHrs(p.id);

          <button class="rank-btn" onclick="moveProj(${rank},-1)">▲</button>
          <button class="rank-btn" onclick="moveProj(${rank},1)">▼</button>
        </div>
        ${badge(p.id)}
      </div>
      <span style="color:#aaa;font-size:11px">#${rank+1}</span>

      <div>

  html+=`<div class="card"><div class="section-title" style="margin-top:0">Monthly milestones</div>
    <div style="display:grid;grid-template-columns:minmax(0,1fr) 72px 88px 22px;gap:6px;padding:3px 0 7px;font-size:10px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid #e0e0e0">

      <input type="checkbox" ${(m.done===true||m.done==='TRUE')?'checked':''} onchange="toggleMS(${i})">

  });
  html+=`</div>`;
  document.getElementById('health').innerHTML=html;

async function moveProj(rank,dir){
  const nr=rank+dir;
  if(nr<0||nr>=state.priority.length) return;
  [state.priority[rank],state.priority[nr]]=[state.priority[nr],state.priority[rank]];
  saveLocal(); renderHealth();
  try{ await apiPost({action:'saveConfig', key:'priority_order', value:JSON.stringify(state.priority)}); setSyncBadge('ok'); }
  catch(e){ setSyncBadge('warn'); }
}

async function toggleMS(i){
  const m=state.milestones[i];
  m.done=!(m.done===true||m.done==='TRUE');
  saveLocal(); renderHealth();
  try{ await apiPost({action:'updateMilestone', milestone:m}); setSyncBadge('ok'); }
  catch(e){ setSyncBadge('warn'); }
}
